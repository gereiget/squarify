<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games | Umalii</title>
    <link rel="icon" type="image/svg+xml" href="./assets/squarify-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">games.umalii.com</p>
        <h1>Available Games</h1>
        <p class="lede">A small hosted game shelf. Squarify is live now, more titles can slot into the same grid later.</p>
      </header>

      <section class="grid" aria-label="Available games">
        <a class="game-card" href="/squarify/">
          <img src="./assets/squarify-icon.svg" alt="Squarify icon" class="game-icon" />
          <div class="game-meta">
            <h2>Squarify</h2>
            <p>Dots and Boxes with local play, online play, and shared backend rules across Android and web.</p>
            <span class="launch">Open game</span>
          </div>
        </a>
      </section>
    </main>
  </body>
  </html>
